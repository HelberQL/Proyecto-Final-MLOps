name: ML Pipeline CI/CD

# =====================================================================
# Pipeline de CI/CD para el proyecto MLOps Bank Customer Balance.
# Se ejecuta automaticamente en push y pull_request a la rama main, y
# tambien puede dispararse manualmente desde la pestana "Actions".
# =====================================================================

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:  # permite ejecutar manualmente desde la UI de GitHub

jobs:
  ml-pipeline:
    name: Train and validate ML pipeline
    runs-on: ubuntu-latest

    steps:
      # -----------------------------------------------------------------
      # 1. Clonar el repositorio
      # -----------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # -----------------------------------------------------------------
      # 2. Instalar Python 3.10 (con cache de pip para acelerar)
      # -----------------------------------------------------------------
      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"
          cache-dependency-path: requirements.txt

      # -----------------------------------------------------------------
      # 3. Instalar dependencias (make install)
      # -----------------------------------------------------------------
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          make install

      # -----------------------------------------------------------------
      # 4. Lint con flake8 (make lint)
      # -----------------------------------------------------------------
      - name: Lint with flake8
        run: make lint

      # -----------------------------------------------------------------
      # 5. Tests unitarios (make test)
      # -----------------------------------------------------------------
      - name: Run unit tests
        run: make test

      # -----------------------------------------------------------------
      # 6. Entrenamiento del modelo (make train)
      #    Esto descarga el dataset, entrena, evalua y registra en MLflow
      # -----------------------------------------------------------------
      - name: Train model and log to MLflow
        run: make train

      # -----------------------------------------------------------------
      # 7. Subir el modelo entrenado como ARTEFACTO del workflow
      # -----------------------------------------------------------------
      - name: Upload trained model artifact
        uses: actions/upload-artifact@v4
        with:
          name: trained-model
          path: |
            artifacts/model.pkl
            artifacts/metrics.json
            artifacts/features.json
          retention-days: 30
          if-no-files-found: error

      # -----------------------------------------------------------------
      # 8. Subir el directorio de MLflow como artefacto
      #    (sirve como evidencia visual del run)
      # -----------------------------------------------------------------
      - name: Upload MLflow tracking directory
        uses: actions/upload-artifact@v4
        with:
          name: mlruns
          path: mlruns/
          retention-days: 30
          if-no-files-found: warn

      # -----------------------------------------------------------------
      # 9. Resumen del pipeline en la UI de Actions
      # -----------------------------------------------------------------
      - name: Pipeline summary
        if: always()
        run: |
          echo "## ML Pipeline Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f artifacts/metrics.json ]; then
            echo "### Metrics" >> $GITHUB_STEP_SUMMARY
            echo '```json' >> $GITHUB_STEP_SUMMARY
            cat artifacts/metrics.json >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Run finished on commit ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
